name: embodied-service safety floor

# Runs the deterministic safety verification on every change to the service.
# Deploy is gated behind it: the deploy job cannot run unless verify passes.

on:
  push:
    paths:
      - "ai-lab/embodied-service/**"
      - ".github/workflows/embodied-verify.yml"
  pull_request:
    paths:
      - "ai-lab/embodied-service/**"
      - ".github/workflows/embodied-verify.yml"
  workflow_dispatch:

jobs:
  verify:
    name: safety floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check worker modules
        run: |
          for f in ai-lab/embodied-service/worker/src/*.js; do
            node --check "$f"
          done
      - name: Run safety verification harness
        run: node ai-lab/embodied-service/verify/verify.mjs

  deploy:
    name: deploy (gated on safety floor)
    needs: verify
    # Manual trigger only, and never from a fork or PR. The deploy step is
    # skipped unless the Cloudflare token is configured, so the workflow stays
    # green on repos without deploy credentials.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-lab/embodied-service/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check for deploy credentials
        id: creds
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set; skipping deploy."
          fi
      - name: Install
        if: steps.creds.outputs.have == 'true'
        run: npm install
      - name: Deploy
        if: steps.creds.outputs.have == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
